name: Update events
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - config.yaml
      - aggregate.py
      - sources/**
      - directory.json      # rebuild immediately when you change the directory
      - manual.ics          # …and when you edit your hand-added events
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect events
        run: python aggregate.py
      - name: Commit if changed
        run: |
          git config user.name "events-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json docs/.translation_cache.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update events"
            git push
          fi
