<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berlin — what's on</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE7DF;      /* warm concrete paper            */
    --paper-2:#E2DED4;    /* recessed panel                 */
    --ink:#17160F;        /* near-black warm ink            */
    --muted:#7C776A;      /* captions / meta                */
    --line:rgba(23,22,15,.16);
    --accent:#1B34E0;     /* riso ultramarine — the one accent */
    --accent-ink:#fff;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--disp);line-height:1.4;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ── Masthead ─────────────────────────────────────────── */
  .mast{
    border-bottom:2px solid var(--ink);
    padding:22px clamp(16px,4vw,40px) 16px;
  }
  .mast h1{
    font-size:clamp(28px,6vw,52px);font-weight:700;letter-spacing:-.02em;
    margin:0;line-height:.98;text-transform:uppercase;
  }
  .mast h1 span{color:var(--accent)}
  .mast .sub{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    margin-top:8px;display:flex;gap:16px;flex-wrap:wrap;text-transform:uppercase;letter-spacing:.04em;
  }

  /* ── Controls ─────────────────────────────────────────── */
  .controls{
    position:sticky;top:0;z-index:5;
    background:var(--paper);border-bottom:1px solid var(--line);
    padding:12px clamp(16px,4vw,40px);
    display:flex;flex-direction:column;gap:10px;
  }
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:2px}

  button.chip,.seg button{
    font-family:var(--mono);font-size:12px;font-weight:500;
    background:transparent;color:var(--ink);
    border:1px solid var(--line);border-radius:0;
    padding:6px 11px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;
    transition:background .12s ease,border-color .12s ease,color .12s ease;
  }
  button.chip:hover,.seg button:hover{border-color:var(--ink)}
  button.chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .seg{display:inline-flex;border:1px solid var(--ink)}
  .seg button{border:0;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink)}

  .free-toggle[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

  .search{
    font-family:var(--mono);font-size:13px;
    border:1px solid var(--line);background:var(--paper-2);
    padding:7px 11px;min-width:200px;flex:1;color:var(--ink);
  }
  .search:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}

  /* ── Feed ─────────────────────────────────────────────── */
  main{padding:0 clamp(16px,4vw,40px) 80px;max-width:960px}
  .day{
    position:sticky;top:112px;z-index:2;background:var(--paper);
    padding:22px 0 8px;border-bottom:1px solid var(--ink);margin-top:14px;
    display:flex;align-items:baseline;gap:12px;
  }
  .day .dow{font-size:clamp(20px,4.5vw,30px);font-weight:700;text-transform:uppercase;letter-spacing:-.01em}
  .day .date{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .day .n{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}

  .ev{
    display:grid;grid-template-columns:96px 1fr auto;gap:16px;align-items:start;
    padding:14px 8px 14px 12px;border-bottom:1px solid var(--line);
    border-left:3px solid transparent;
    transition:background .12s ease,border-color .12s ease;
  }
  .ev:hover{background:var(--paper-2);border-left-color:var(--accent)}
  .ev .time{font-family:var(--mono);font-size:13px;font-weight:600;padding-top:2px;white-space:nowrap}
  .ev .time .to{color:var(--muted);font-weight:400;font-size:11px;display:block}
  .ev .title{font-size:17px;font-weight:500;letter-spacing:-.01em}
  .ev .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.03em}
  .ev .desc{font-size:13px;color:var(--muted);margin-top:6px;max-width:60ch}
  .ev .tags{display:flex;flex-direction:column;gap:6px;align-items:flex-end;text-align:right}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;border:1px solid var(--line);padding:2px 6px;text-transform:uppercase}
  .tag.free{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}

  /* ── States ───────────────────────────────────────────── */
  .state{font-family:var(--mono);font-size:13px;color:var(--muted);padding:60px 4px;line-height:1.7;max-width:52ch}
  .state b{color:var(--ink);display:block;font-size:15px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  code{background:var(--paper-2);padding:1px 5px;font-size:12px}

  @media (max-width:560px){
    .ev{grid-template-columns:1fr;gap:4px}
    .ev .tags{flex-direction:row;align-items:center;text-align:left;margin-top:4px}
    .ev .time{padding-top:0}
    .ev .time .to{display:inline;margin-left:6px}
    .day{top:0}
    .controls{position:static}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header class="mast">
    <h1>Berlin — <span>was läuft</span></h1>
    <div class="sub">
      <span id="count">loading…</span>
      <span id="updated"></span>
      <span>free &amp; almost-free · auto-updated</span>
    </div>
  </header>

  <section class="controls" aria-label="Filters">
    <div class="row" role="group" aria-label="When">
      <span class="lbl">When</span>
      <div class="seg" id="presets">
        <button data-preset="weekend" aria-pressed="true">This weekend</button>
        <button data-preset="today" aria-pressed="false">Today</button>
        <button data-preset="week" aria-pressed="false">7 days</button>
        <button data-preset="all" aria-pressed="false">All</button>
      </div>
      <button class="chip free-toggle" id="freeBtn" aria-pressed="false">Free only</button>
    </div>
    <div class="row" id="cats" role="group" aria-label="Categories">
      <span class="lbl">What</span>
    </div>
    <div class="row">
      <input class="search" id="search" type="search" placeholder="Search title or venue…" aria-label="Search">
    </div>
  </section>

  <main id="feed"><div class="state">Loading events…</div></main>

<script>
const CATS = [
  ["music","Music"],["nightlife","Nightlife"],["art","Art / film / talks"],
  ["sport","Sport"],["community","Community"],["market","Markets"],["other","Other"],
];
const state = { preset:"weekend", cats:new Set(), free:false, q:"" };
let ALL = [];

const berlinDate = iso => new Date(iso).toLocaleDateString("en-CA",{timeZone:"Europe/Berlin"});
const berlinTime = iso => new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Berlin"});
const dowLabel   = iso => new Date(iso).toLocaleDateString("en-GB",{weekday:"long",timeZone:"Europe/Berlin"});
const dateLabel  = iso => new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",timeZone:"Europe/Berlin"});

function weekendRange(){
  const d = new Date(); const day = d.getDay(); const s = new Date(d);
  if (day===0) s.setDate(d.getDate()-2);          // Sunday → back to Friday
  else if (day===6) s.setDate(d.getDate()-1);     // Saturday → back to Friday
  else s.setDate(d.getDate()+(5-day));            // Mon–Thu → upcoming Friday
  s.setHours(0,0,0,0);
  const e = new Date(s); e.setDate(s.getDate()+2); e.setHours(23,59,59,999);
  return [s,e];
}
function range(){
  const now = new Date();
  if (state.preset==="weekend") return weekendRange();
  if (state.preset==="today"){ const s=new Date(now);s.setHours(0,0,0,0); const e=new Date(now);e.setHours(23,59,59,999); return [s,e]; }
  if (state.preset==="week"){ const s=new Date(now);s.setHours(0,0,0,0); const e=new Date(s);e.setDate(s.getDate()+7); return [s,e]; }
  const s=new Date(now);s.setHours(0,0,0,0); return [s,new Date(8.64e15)];   // all upcoming
}

function matches(ev){
  const [s,e] = range(); const t = new Date(ev.start);
  if (t<s || t>e) return false;
  if (state.free && ev.is_free!==true) return false;
  if (state.cats.size && !state.cats.has(ev.category)) return false;
  if (state.q){
    const hay = (ev.title+" "+(ev.venue||"")+" "+(ev.area||"")).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function render(){
  const feed = document.getElementById("feed");
  const rows = ALL.filter(matches);
  document.getElementById("count").textContent = rows.length + " event" + (rows.length===1?"":"s") + " shown";

  if (!rows.length){
    feed.innerHTML = `<div class="state"><b>Nothing here</b>
      No events match these filters. Widen the date range, clear a category, or add more
      feeds in <code>config.yaml</code> and re-run the aggregator.</div>`;
    return;
  }
  const byDay = {};
  for (const ev of rows){ (byDay[berlinDate(ev.start)] ||= []).push(ev); }

  let html = "";
  for (const day of Object.keys(byDay).sort()){
    const list = byDay[day];
    html += `<div class="day"><span class="dow">${dowLabel(list[0].start)}</span>
             <span class="date">${dateLabel(list[0].start)}</span>
             <span class="n">${list.length}</span></div>`;
    for (const ev of list) html += card(ev);
  }
  feed.innerHTML = html;
}

function card(ev){
  const catLabel = (CATS.find(c=>c[0]===ev.category)||["","Other"])[1];
  const to = ev.end ? `<span class="to">→ ${berlinTime(ev.end)}</span>` : "";
  const title = ev.url
    ? `<a href="${ev.url}" target="_blank" rel="noopener">${esc(ev.title)}</a>`
    : esc(ev.title);
  const metaBits = [ev.venue, ev.area, ev.source.replace(/^cal:|^rss:|^web:/,"")].filter(Boolean).map(esc);
  const desc = ev.description ? `<div class="desc">${esc(ev.description)}</div>` : "";
  const free = ev.is_free===true ? `<span class="tag free">Free</span>`
            : (ev.price ? `<span class="tag">${esc(ev.price)}</span>` : "");
  return `<article class="ev">
    <div class="time">${berlinTime(ev.start)}${to}</div>
    <div><div class="title">${title}</div>
      <div class="meta">${metaBits.join(" · ")}</div>${desc}</div>
    <div class="tags"><span class="tag">${catLabel.split(" ")[0]}</span>${free}</div>
  </article>`;
}
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ── Wire up controls ────────────────────────────────────────
function buildCats(){
  const box = document.getElementById("cats");
  for (const [id,label] of CATS){
    const b = document.createElement("button");
    b.className="chip"; b.textContent=label; b.setAttribute("aria-pressed","false");
    b.onclick=()=>{ b.getAttribute("aria-pressed")==="true"?(state.cats.delete(id),b.setAttribute("aria-pressed","false")):(state.cats.add(id),b.setAttribute("aria-pressed","true")); render(); };
    box.appendChild(b);
  }
}
document.getElementById("presets").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.preset=b.dataset.preset;
  [...b.parentElement.children].forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
  render();
});
document.getElementById("freeBtn").onclick=function(){
  state.free=!state.free; this.setAttribute("aria-pressed", state.free?"true":"false"); render();
};
document.getElementById("search").addEventListener("input",e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });

// ── Load data ───────────────────────────────────────────────
buildCats();
fetch("events.json?_="+Date.now())
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(d=>{
    ALL = d.events||[];
    if (d.generated_at){
      const ago = Math.round((Date.now()-new Date(d.generated_at))/36e5);
      document.getElementById("updated").textContent = "updated " + (ago<1?"just now":ago+"h ago");
    }
    render();
  })
  .catch(err=>{
    document.getElementById("feed").innerHTML =
      `<div class="state"><b>Couldn't load events</b>
       events.json didn't load (${esc(err.message)}). Run <code>python aggregate.py</code>
       locally, or wait for the next scheduled update to publish it.</div>`;
    document.getElementById("count").textContent="—";
  });
</script>
</body>
</html>
