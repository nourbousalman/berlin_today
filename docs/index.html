<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nour's Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF7F1; --surface:#FFFFFF; --ink:#4B4757; --head:#39354A; --muted:#A29DAB;
    --line:rgba(57,53,74,.10); --track:#F1ECE6; --accent:#7B84DB; --accent-soft:#EAEBFB;
    --shadow:0 2px 10px rgba(60,50,80,.06),0 1px 3px rgba(60,50,80,.05);
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
    --controls-h:150px;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:500;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

  /* soft, calm colour per category */
  .cat-music{--c:#E1734E;--cb:#FCE6DD}
  .cat-nightlife{--c:#9A72CF;--cb:#EDE4FB}
  .cat-art{--c:#D66A9E;--cb:#FBE1EE}
  .cat-sport{--c:#4FA377;--cb:#DDF0E4}
  .cat-community{--c:#5A90CC;--cb:#DFEDFB}
  .cat-market{--c:#C6912F;--cb:#FAECCF}
  .cat-other{--c:#8C88A0;--cb:#ECEAF3}

  .mast{padding:26px clamp(16px,4vw,40px) 14px}
  .mast h1{font-family:var(--disp);font-size:clamp(30px,6vw,52px);font-weight:600;letter-spacing:-.01em;margin:0;line-height:1;color:var(--head)}
  .mast h1 .a{color:var(--accent)}
  .mast .sub{font-size:13px;color:var(--muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap;font-weight:600}

  .controls{position:sticky;top:0;z-index:5;background:rgba(251,247,241,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px clamp(16px,4vw,40px)}
  .ctrl-top{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center}
  .group{display:flex;align-items:center;gap:8px}
  .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .seg{display:inline-flex;gap:2px;background:var(--track);border-radius:999px;padding:3px}
  .seg button{font-family:var(--body);font-weight:700;font-size:13px;border:0;border-radius:999px;background:transparent;color:var(--ink);padding:6px 13px;cursor:pointer;transition:background .15s,color .15s}
  .seg button:hover{color:var(--head)}
  .seg button[aria-pressed="true"]{background:var(--surface);color:var(--head);box-shadow:var(--shadow)}
  .mode-seg{background:var(--accent-soft)}
  .mode-seg button[aria-pressed="true"]{background:var(--accent);color:#fff;box-shadow:none}
  .searchwrap{flex:1;min-width:180px;display:flex}
  .search{flex:1;font-family:var(--body);font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:9px 16px;color:var(--ink)}
  .search::placeholder{color:var(--muted)}
  .search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
  .chip{font-family:var(--body);font-weight:700;font-size:13px;border:0;border-radius:999px;padding:6px 13px;cursor:pointer;background:var(--cb,#eee);color:var(--c,#666);opacity:.85;transition:transform .1s,box-shadow .15s,opacity .15s}
  .chip:hover{opacity:1;transform:translateY(-1px)}
  .chip[aria-pressed="true"]{background:var(--c,#666);color:#fff;opacity:1;box-shadow:var(--shadow)}

  main{padding:8px clamp(16px,4vw,40px) 40px;max-width:1000px}
  .day{position:sticky;top:var(--controls-h);z-index:2;background:var(--bg);padding:20px 4px 8px;margin-top:10px;display:flex;align-items:baseline;gap:12px}
  .day .dow{font-family:var(--disp);font-size:clamp(21px,4vw,30px);font-weight:600;color:var(--head)}
  .day .date{font-size:13px;color:var(--muted);font-weight:700}
  .day .n{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;background:var(--track);border-radius:999px;padding:2px 10px}

  .ev{display:grid;grid-template-columns:88px 1fr auto;gap:16px;align-items:start;background:var(--surface);border-radius:16px;box-shadow:var(--shadow);border-left:5px solid var(--c,var(--accent));padding:14px 16px;margin-bottom:10px;transition:transform .12s,box-shadow .15s}
  .ev:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(60,50,80,.10)}
  .ev .time{font-family:var(--disp);font-size:15px;font-weight:500;color:var(--head);padding-top:1px;white-space:nowrap}
  .ev .time .to{display:block;color:var(--muted);font-size:12px;font-weight:400}
  .ev .title{font-size:17px;font-weight:700;color:var(--head);line-height:1.25}
  .ev .meta{font-size:12.5px;color:var(--muted);margin-top:4px;font-weight:600}
  .ev .desc{font-size:13.5px;color:var(--ink);margin-top:7px;max-width:64ch;opacity:.85}
  .ev .tags{display:flex;flex-direction:column;gap:6px;align-items:flex-end;text-align:right}
  .tag{font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px;white-space:nowrap;letter-spacing:.02em}
  .cat-tag{background:var(--cb);color:var(--c)}
  .tag.free{background:#D6EFDF;color:#358056}
  .tag.price{background:#F0ECE6;color:#7C776C}
  .tag.cadence{background:var(--track);color:var(--muted)}
  .tag.tr{background:transparent;color:var(--muted);font-weight:700;padding:3px 0}

  .dir{margin-bottom:6px}
  .dir-item{display:block;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:12px 16px;margin-bottom:8px;border-left:5px solid var(--accent);transition:transform .12s,box-shadow .15s}
  .dir-item:hover{text-decoration:none;transform:translateY(-2px);box-shadow:0 6px 18px rgba(60,50,80,.10)}
  .dir-name{font-family:var(--disp);font-size:16px;font-weight:500;color:var(--accent)}
  .dir-note{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:600}

  .state{font-size:14px;color:var(--muted);padding:50px 6px;line-height:1.7;max-width:54ch;font-weight:600}
  .state b{display:block;font-family:var(--disp);color:var(--head);font-size:18px;font-weight:600;margin-bottom:6px}
  code{background:var(--track);border-radius:6px;padding:1px 6px;font-size:12.5px;font-family:ui-monospace,monospace}

  .sources{max-width:1000px;margin:0 clamp(16px,4vw,40px);border-top:1px solid var(--line);padding:16px 0 60px}
  .sources summary{font-size:12px;color:var(--muted);cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .src-grid{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:12px}
  .src-item{font-size:12.5px;color:var(--ink);font-weight:600;background:var(--surface);border-radius:999px;padding:4px 12px;box-shadow:var(--shadow)}
  .src-item .z{color:#D06868;font-weight:800}
  .src-item .c{color:#4FA377;font-weight:800}

  @media (max-width:600px){
    .ev{grid-template-columns:1fr;gap:5px}
    .ev .tags{flex-direction:row;align-items:center;text-align:left;margin-top:6px;flex-wrap:wrap}
    .ev .time{padding-top:0}.ev .time .to{display:inline;margin-left:6px}
    .day{top:0}.controls{position:static}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header class="mast">
    <h1>Nour's <span class="a">Planner</span></h1>
    <div class="sub"><span id="count">loading…</span><span id="updated"></span><span>Berlin · free &amp; almost-free</span></div>
  </header>

  <section class="controls" id="controls" aria-label="Filters">
    <div class="ctrl-top">
      <div class="group" role="group" aria-label="View">
        <span class="lbl">View</span>
        <div class="seg mode-seg" id="modes">
          <button data-mode="oneoff" aria-pressed="true">One-off</button>
          <button data-mode="recurring" aria-pressed="false">Recurring</button>
          <button data-mode="directory" aria-pressed="false">Directory</button>
        </div>
      </div>
      <div class="group filter-row" id="whenRow" role="group" aria-label="When">
        <span class="lbl">When</span>
        <div class="seg" id="presets">
          <button data-preset="weekend" aria-pressed="true">This weekend</button>
          <button data-preset="today" aria-pressed="false">Today</button>
          <button data-preset="week" aria-pressed="false">7 days</button>
          <button data-preset="all" aria-pressed="false">All</button>
        </div>
      </div>
      <div class="group filter-row" role="group" aria-label="Cost">
        <span class="lbl">Cost</span>
        <div class="seg" id="costs">
          <button data-cost="any" aria-pressed="true">Any</button>
          <button data-cost="free" aria-pressed="false">Free</button>
          <button data-cost="5" aria-pressed="false">≤€5</button>
        </div>
      </div>
      <div class="group filter-row" role="group" aria-label="Sort">
        <span class="lbl">Sort</span>
        <div class="seg" id="sorts">
          <button data-sort="time" aria-pressed="true">Time</button>
          <button data-sort="price" aria-pressed="false">Price</button>
        </div>
      </div>
      <div class="searchwrap filter-row">
        <input class="search" id="search" type="search" placeholder="Search title or venue…" aria-label="Search">
      </div>
    </div>
    <div class="cats filter-row" id="cats" role="group" aria-label="Categories"><span class="lbl">What</span></div>
  </section>

  <main id="feed"><div class="state">Loading events…</div></main>
  <details class="sources" id="sources" hidden><summary>Sources — what's loading</summary><div class="src-grid" id="srcGrid"></div></details>

    {name:"Institut français",url:"https://www.institutfrancais.de/",note:"French film nights, talks, events"},
    {name:"Instituto Cervantes",url:"https://berlin.cervantes.es/",note:"Spanish-language culture & film"},
    {name:"Nordic Embassies (Felleshus)",url:"https://www.nordicembassies.org/",note:"Nordic exhibitions, concerts, talks"},
    {name:"Polish Institute",url:"https://instytutpolski.pl/berlin/",note:"Polish culture events"},
    {name:"Japan Foundation (JKI)",url:"https://www.jki.de/",note:"Japanese culture, film, talks"},
  ]},
  {group:"Sport & outdoors",items:[
    {name:"Sport im Park",url:"https://www.berlin.de/sen/inneres/sport/breitensport/sport-im-park/",note:"270+ free outdoor courses citywide"},
    {name:"parkrun Germany",url:"https://www.parkrun.com.de/",note:"Free timed 5K, Saturdays"},
    {name:"Running Clubs Berlin",url:"https://www.runningclubsberlin.de/",note:"Directory of free run crews"},
    {name:"calisthenics-parks.com",url:"https://calisthenics-parks.com/regions/1-en-berlin-area",note:"Free outdoor gyms + communities"},
    {name:"ADFC Berlin",url:"https://adfc-berlin.de/",note:"Cycling club; group rides & tours"},
    {name:"DAV Sektion Berlin",url:"https://www.dav-berlin.de/",note:"Alpine club; hikes, climbing, trips"},
  ]},
  {group:"Markets, libraries & language",items:[
    {name:"Berlin.de — Flea markets",url:"https://www.berlin.de/en/shopping/markets/flea-markets/",note:"Master list; most are free Sundays"},
    {name:"Markthalle Neun",url:"https://markthalleneun.de/",note:"Street Food Thursday & market events"},
    {name:"Kleidertausch",url:"https://kleidertausch.de/events/",note:"Free clothes-swap events"},
    {name:"ZLB (Central Library)",url:"https://www.zlb.de/",note:"Free events, workshops, workspace"},
    {name:"VÖBB (all libraries)",url:"https://www.voebb.de/",note:"Every Berlin public library + events"},
    {name:"Tandem — language exchange",url:"https://tandem.net/language-exchange/germany/berlin",note:"Find 1-on-1 language partners"},
  ]},
];
const state={mode:"oneoff",preset:"weekend",cats:new Set(),cost:"any",sort:"time",q:""};
let ALL=[];

const bDate=iso=>new Date(iso).toLocaleDateString("en-CA",{timeZone:"Europe/Berlin"});
const bTime=iso=>new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Berlin"});
const bDow=iso=>new Date(iso).toLocaleDateString("en-GB",{weekday:"long",timeZone:"Europe/Berlin"});
const bDateL=iso=>new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",timeZone:"Europe/Berlin"});
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function weekendRange(){const d=new Date(),day=d.getDay(),s=new Date(d);if(day===0)s.setDate(d.getDate()-2);else if(day===6)s.setDate(d.getDate()-1);else s.setDate(d.getDate()+(5-day));s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+2);e.setHours(23,59,59,999);return[s,e];}
function range(){const now=new Date();if(state.preset==="weekend")return weekendRange();if(state.preset==="today"){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return[s,e];}if(state.preset==="week"){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+7);return[s,e];}const s=new Date(now);s.setHours(0,0,0,0);return[s,new Date(8.64e15)];}

function passesFilters(ev){
  if(state.cats.size&&!state.cats.has(ev.category))return false;
  if(state.cost==="free"&&ev.is_free!==true)return false;
  if(state.cost==="5"&&!(ev.is_free===true||(ev.price_value!=null&&ev.price_value<=5)))return false;
  if(state.q){const hay=(ev.title+" "+(ev.venue||"")+" "+(ev.area||"")).toLowerCase();if(!hay.includes(state.q))return false;}
  return true;
}
const priceKey=ev=>ev.is_free===true?0:(ev.price_value!=null?ev.price_value:Infinity);

function render(){
  const feed=document.getElementById("feed");
  const dir=state.mode==="directory";
  document.querySelectorAll(".filter-row").forEach(r=>r.style.display=dir?"none":"flex");
  if(!dir)document.getElementById("whenRow").style.display=state.mode==="recurring"?"none":"flex";
  feed.innerHTML = dir?renderDirectory() : (state.sort==="price"?renderFlat():renderGrouped());
  requestAnimationFrame(()=>document.documentElement.style.setProperty("--controls-h",document.getElementById("controls").offsetHeight+"px"));
}

function pool(){
  if(state.mode==="recurring")return ALL.filter(ev=>ev.recurring&&passesFilters(ev));
  const[rangeStart,rangeEnd]=range();
  return ALL.filter(ev=>!ev.recurring&&passesFilters(ev)&&(()=>{const t=new Date(ev.start);return t>=rangeStart&&t<=rangeEnd;})());
}

function renderGrouped(){
  const rows=pool();
  setCount(rows.length,state.mode==="recurring"?"recurring":"one-off");
  if(!rows.length)return emptyState();
  if(state.mode==="recurring"){
    const wk={},other=[];
    for(const ev of rows){(ev.recurrence||"").startsWith("Weekly")?((wk[bDow(ev.start)]||=[]).push(ev)):other.push(ev);}
    let html="";
    for(const n of WEEKDAYS){if(!wk[n])continue;wk[n].sort((a,b)=>bTime(a.start).localeCompare(bTime(b.start)));html+=`<div class="day"><span class="dow">Every ${n}</span><span class="n">${wk[n].length}</span></div>`;for(const ev of wk[n])html+=card(ev,{recurring:true});}
    if(other.length){other.sort((a,b)=>new Date(a.start)-new Date(b.start));html+=`<div class="day"><span class="dow">Monthly &amp; occasional</span><span class="n">${other.length}</span></div>`;for(const ev of other)html+=card(ev,{recurring:true});}
    return html;
  }
  const byDay={};for(const ev of rows)(byDay[bDate(ev.start)]||=[]).push(ev);
  let html="";
  for(const day of Object.keys(byDay).sort()){const list=byDay[day];html+=`<div class="day"><span class="dow">${bDow(list[0].start)}</span><span class="date">${bDateL(list[0].start)}</span><span class="n">${list.length}</span></div>`;for(const ev of list)html+=card(ev,{recurring:false});}
  return html;
}

function renderFlat(){
  const recurring=state.mode==="recurring";
  const rows=pool().sort((a,b)=>priceKey(a)-priceKey(b)||new Date(a.start)-new Date(b.start));
  setCount(rows.length,recurring?"recurring":"one-off");
  if(!rows.length)return emptyState();
  let html=`<div class="day"><span class="dow">By price</span><span class="date">low → high</span><span class="n">${rows.length}</span></div>`;
  for(const ev of rows)html+=card(ev,{recurring,showDate:true});
  return html;
}

function card(ev,opts){
  const recurring=opts.recurring,showDate=opts.showDate;
  const catLabel=(CATS.find(c=>c[0]===ev.category)||["","Other"])[1].split(" ")[0];
  const to=(!recurring&&ev.end)?`<span class="to">→ ${bTime(ev.end)}</span>`:"";
  const title=ev.url?`<a href="${ev.url}" target="_blank" rel="noopener">${esc(ev.title)}</a>`:esc(ev.title);
  const lead=(showDate&&!recurring)?[bDow(ev.start).slice(0,3)+" "+bDateL(ev.start)]:[];
  const metaBits=[...lead,ev.venue,ev.area,ev.source.replace(/^cal:|^rss:|^web:/,"")].filter(Boolean).map(esc);
  const tr=ev.translated?`<span class="tag tr">↳ translated</span>`:"";
  const desc=ev.description?`<div class="desc">${esc(ev.description)}${tr}</div>`:(tr?`<div class="desc">${tr}</div>`:"");
  const money=ev.is_free===true?`<span class="tag free">Free</span>`:(ev.price?`<span class="tag price">${esc(ev.price)}</span>`:"");
  const cadence=recurring&&ev.recurrence?`<span class="tag cadence">${esc(ev.recurrence)}</span>`:"";
  return `<article class="ev cat-${ev.category}"><div class="time">${bTime(ev.start)}${to}</div><div><div class="title">${title}</div><div class="meta">${metaBits.join(" · ")}</div>${desc}</div><div class="tags"><span class="tag cat-tag">${catLabel}</span>${cadence}${money}</div></article>`;
}

function renderDirectory(){
  setCount(DIRECTORY.reduce((n,s)=>n+s.items.length,0),"curated");
  let html="";
  for(const sec of DIRECTORY){
    html+=`<div class="day"><span class="dow">${esc(sec.group)}</span><span class="n">${sec.items.length}</span></div><div class="dir">`;
    for(const it of sec.items)html+=`<a class="dir-item" href="${it.url}" target="_blank" rel="noopener"><span class="dir-name">${esc(it.name)}</span>${it.note?`<span class="dir-note">${esc(it.note)}</span>`:""}</a>`;
    html+=`</div>`;
  }
  return html;
}

function setCount(n,kind){document.getElementById("count").textContent=`${n} ${kind}${kind==="curated"?" sources":" event"+(n===1?"":"s")} shown`;}
function emptyState(){
  const b=state.cost!=="any"?" (or loosen the cost filter)":"";
  return `<div class="state"><b>Nothing here</b>No events match these filters${b}. Widen the date range, clear a category, or add feeds in <code>config.yaml</code>. Check the Sources panel at the bottom to see what's loading.</div>`;
}

function buildSeg(id,key,cb){document.getElementById(id).addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;state[key]=b.dataset[key];[...b.parentElement.children].forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));(cb||render)();});}
function buildCats(){const box=document.getElementById("cats");for(const[id,label]of CATS){const b=document.createElement("button");b.className="chip cat-"+id;b.textContent=label;b.setAttribute("aria-pressed","false");b.onclick=()=>{b.getAttribute("aria-pressed")==="true"?(state.cats.delete(id),b.setAttribute("aria-pressed","false")):(state.cats.add(id),b.setAttribute("aria-pressed","true"));render();};box.appendChild(b);}}
buildCats();
buildSeg("modes","mode");buildSeg("presets","preset");buildSeg("costs","cost");buildSeg("sorts","sort");
document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase();render();});

function showSources(sources){
  if(!sources)return;
  const grid=document.getElementById("srcGrid");
  grid.innerHTML=Object.entries(sources).map(([k,v])=>{
    const name=k.replace(/^cal:|^rss:/,"");
    return `<span class="src-item">${esc(name)} <span class="${v===0?"z":"c"}">${v}</span></span>`;
  }).join("");
  document.getElementById("sources").hidden=false;
}

fetch("events.json?_="+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(d=>{
    ALL=d.events||[];
    if(d.generated_at){const ago=Math.round((Date.now()-new Date(d.generated_at))/36e5);document.getElementById("updated").textContent="updated "+(ago<1?"just now":ago+"h ago");}
    render();showSources(d.sources);
  })
  .catch(err=>{
    document.getElementById("feed").innerHTML=`<div class="state"><b>Couldn't load events</b>events.json didn't load (${esc(err.message)}). Run <code>python aggregate.py</code>, or wait for the next scheduled update.</div>`;
    document.getElementById("count").textContent="—";
  });
</script>
</body>
</html>
