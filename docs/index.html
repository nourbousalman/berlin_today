<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nour's Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE7DF;--paper-2:#E2DED4;--ink:#17160F;--muted:#7C776A;
    --line:rgba(23,22,15,.16);--accent:#1B34E0;--accent-ink:#fff;
    --disp:'Space Grotesk',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;
    --controls-h:190px;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--disp);line-height:1.4;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

  .mast{border-bottom:2px solid var(--ink);padding:22px clamp(16px,4vw,40px) 16px}
  .mast h1{font-size:clamp(28px,6vw,52px);font-weight:700;letter-spacing:-.02em;margin:0;line-height:.98;text-transform:uppercase}
  .mast h1 span{color:var(--accent)}
  .mast .sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px;display:flex;gap:16px;flex-wrap:wrap;text-transform:uppercase;letter-spacing:.04em}

  .controls{position:sticky;top:0;z-index:5;background:var(--paper);border-bottom:1px solid var(--line);padding:12px clamp(16px,4vw,40px);display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:2px}

  button.chip,.seg button{font-family:var(--mono);font-size:12px;font-weight:500;background:transparent;color:var(--ink);border:1px solid var(--line);padding:6px 11px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;transition:background .12s,border-color .12s,color .12s}
  button.chip:hover,.seg button:hover{border-color:var(--ink)}
  button.chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .seg{display:inline-flex;border:1px solid var(--ink)}
  .seg button{border:0;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink)}
  .mode-seg button{font-weight:700;padding:8px 16px;font-size:13px}
  .search{font-family:var(--mono);font-size:13px;border:1px solid var(--line);background:var(--paper-2);padding:7px 11px;min-width:200px;flex:1;color:var(--ink)}
  .search:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}

  main{padding:0 clamp(16px,4vw,40px) 40px;max-width:960px}
  .day{position:sticky;top:var(--controls-h);z-index:2;background:var(--paper);padding:22px 0 8px;border-bottom:1px solid var(--ink);margin-top:14px;display:flex;align-items:baseline;gap:12px}
  .day .dow{font-size:clamp(20px,4.5vw,30px);font-weight:700;text-transform:uppercase;letter-spacing:-.01em}
  .day .date{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .day .n{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}

  .ev{display:grid;grid-template-columns:96px 1fr auto;gap:16px;align-items:start;padding:14px 8px 14px 12px;border-bottom:1px solid var(--line);border-left:3px solid transparent;transition:background .12s,border-color .12s}
  .ev:hover{background:var(--paper-2);border-left-color:var(--accent)}
  .ev .time{font-family:var(--mono);font-size:13px;font-weight:600;padding-top:2px;white-space:nowrap}
  .ev .time .to{color:var(--muted);font-weight:400;font-size:11px;display:block}
  .ev .title{font-size:17px;font-weight:500;letter-spacing:-.01em}
  .ev .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.03em}
  .ev .desc{font-size:13px;color:var(--muted);margin-top:6px;max-width:60ch}
  .ev .tags{display:flex;flex-direction:column;gap:6px;align-items:flex-end;text-align:right}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;border:1px solid var(--line);padding:2px 6px;text-transform:uppercase;white-space:nowrap}
  .tag.free{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .tag.price{border-color:var(--ink);font-weight:600}
  .tag.cadence{border-color:var(--ink)}
  .tag.tr{border:0;color:var(--muted);padding:2px 0}

  .dir{padding:4px 0 8px}
  .dir-item{display:block;padding:11px 8px 11px 12px;border-bottom:1px solid var(--line);border-left:3px solid transparent}
  .dir-item:hover{background:var(--paper-2);border-left-color:var(--accent);text-decoration:none}
  .dir-name{font-size:16px;font-weight:500;color:var(--accent)}
  .dir-note{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;text-transform:none}

  .state{font-family:var(--mono);font-size:13px;color:var(--muted);padding:60px 4px;line-height:1.7;max-width:52ch}
  .state b{color:var(--ink);display:block;font-size:15px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  code{background:var(--paper-2);padding:1px 5px;font-size:12px}

  .sources{max-width:960px;margin:0 clamp(16px,4vw,40px);border-top:1px solid var(--line);padding:16px 0 60px}
  .sources summary{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;cursor:pointer}
  .src-grid{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:12px}
  .src-item{font-family:var(--mono);font-size:11px;color:var(--ink)}
  .src-item .z{color:#b23b3b}
  .src-item .c{color:var(--muted)}

  @media (max-width:560px){
    .ev{grid-template-columns:1fr;gap:4px}
    .ev .tags{flex-direction:row;align-items:center;text-align:left;margin-top:4px;flex-wrap:wrap}
    .ev .time{padding-top:0}.ev .time .to{display:inline;margin-left:6px}
    .day{top:0}.controls{position:static}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header class="mast">
    <h1>Nour's <span>Planner</span></h1>
    <div class="sub"><span id="count">loading…</span><span id="updated"></span><span>Berlin · free &amp; almost-free</span></div>
  </header>

  <section class="controls" id="controls" aria-label="Filters">
    <div class="row" role="group" aria-label="View">
      <span class="lbl">View</span>
      <div class="seg mode-seg" id="modes">
        <button data-mode="oneoff" aria-pressed="true">One-off</button>
        <button data-mode="recurring" aria-pressed="false">Recurring</button>
        <button data-mode="directory" aria-pressed="false">Directory</button>
      </div>
    </div>
    <div class="row filter-row" id="whenRow" role="group" aria-label="When">
      <span class="lbl">When</span>
      <div class="seg" id="presets">
        <button data-preset="weekend" aria-pressed="true">This weekend</button>
        <button data-preset="today" aria-pressed="false">Today</button>
        <button data-preset="week" aria-pressed="false">7 days</button>
        <button data-preset="all" aria-pressed="false">All</button>
      </div>
    </div>
    <div class="row filter-row" id="cats" role="group" aria-label="Categories"><span class="lbl">What</span></div>
    <div class="row filter-row">
      <span class="lbl">Cost</span>
      <div class="seg" id="costs">
        <button data-cost="any" aria-pressed="true">Any</button>
        <button data-cost="free" aria-pressed="false">Free</button>
        <button data-cost="10" aria-pressed="false">≤€10</button>
        <button data-cost="20" aria-pressed="false">≤€20</button>
      </div>
      <span class="lbl" style="margin-left:8px">Sort</span>
      <div class="seg" id="sorts">
        <button data-sort="time" aria-pressed="true">Time</button>
        <button data-sort="price" aria-pressed="false">Price</button>
      </div>
    </div>
    <div class="row filter-row">
      <input class="search" id="search" type="search" placeholder="Search title or venue…" aria-label="Search">
    </div>
  </section>

  <main id="feed"><div class="state">Loading events…</div></main>
  <details class="sources" id="sources" hidden><summary>Sources — what's loading</summary><div class="src-grid" id="srcGrid"></div></details>

<script>
const CATS=[["music","Music"],["nightlife","Nightlife"],["art","Art / film / talks"],["sport","Sport"],["community","Community"],["market","Markets"],["other","Other"]];
const WEEKDAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DIRECTORY=[
  {group:"Listings & what's-on",items:[
    {name:"gratis-in-berlin.de",url:"https://www.gratis-in-berlin.de/",note:"The dedicated free-events site + newsletter"},
    {name:"Berlin.de — Events",url:"https://www.berlin.de/en/events/",note:"Official city listings"},
    {name:"visitBerlin — Free",url:"https://www.visitberlin.de/en/events-free-berlin",note:"Curated free things to do"},
    {name:"tip Berlin",url:"https://www.tip-berlin.de/",note:"City magazine, strong concert/party listings"},
    {name:"The Berliner",url:"https://www.the-berliner.com/",note:"English-language culture guides"},
    {name:"Resident Advisor — Berlin",url:"https://ra.co/events/de/berlin",note:"Clubs & electronic (already fed into this page)"},
    {name:"Meetup — Berlin",url:"https://www.meetup.com/find/",note:"Community, language, hikes, boardgames"},
    {name:"Luma — Berlin",url:"https://luma.com/berlin",note:"Tech / creative / community events"},
  ]},
  {group:"Live music & jams",items:[
    {name:"berlinersessions.de",url:"https://berlinersessions.de/",note:"70+ open mics & jams by weekday/district"},
    {name:"berlin-sessions.com",url:"https://berlin-sessions.com/",note:"Jam directory by genre"},
    {name:"Philharmonie Lunchkonzert",url:"https://www.berliner-philharmoniker.de/en/concerts/lunch-concerts/",note:"Free, Wed 13:00, Sep–Jun"},
  ]},
  {group:"Sport & outdoors",items:[
    {name:"Sport im Park",url:"https://www.berlin.de/sen/inneres/sport/breitensport/sport-im-park/",note:"270+ free outdoor courses citywide"},
    {name:"parkrun Germany",url:"https://www.parkrun.com.de/",note:"Free timed 5K, Saturdays"},
    {name:"Running Clubs Berlin",url:"https://www.runningclubsberlin.de/",note:"Directory of free run crews"},
    {name:"calisthenics-parks.com",url:"https://calisthenics-parks.com/regions/1-en-berlin-area",note:"Free outdoor gyms + communities"},
  ]},
  {group:"Community & language",items:[
    {name:"Tandem app",url:"https://tandem.net/language-exchange/germany/berlin",note:"1-on-1 language partners"},
    {name:"Meetup — Language exchange",url:"https://www.meetup.com/find/de--berlin/language-exchange/",note:"Sprachcafés & tandems"},
  ]},
  {group:"Markets & museums",items:[
    {name:"Berlin.de — Flea markets",url:"https://www.berlin.de/en/shopping/markets/flea-markets/",note:"Master list; most are free Sundays"},
    {name:"Staatliche Museen (SMB)",url:"https://www.smb.museum/en/home/",note:"Free under 18 daily; free 1st-Thu evening at Hamburger Bahnhof"},
  ]},
];
const state={mode:"oneoff",preset:"weekend",cats:new Set(),cost:"any",sort:"time",q:""};
let ALL=[];

const bDate=iso=>new Date(iso).toLocaleDateString("en-CA",{timeZone:"Europe/Berlin"});
const bTime=iso=>new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Berlin"});
const bDow=iso=>new Date(iso).toLocaleDateString("en-GB",{weekday:"long",timeZone:"Europe/Berlin"});
const bDateL=iso=>new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",timeZone:"Europe/Berlin"});
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function weekendRange(){const d=new Date(),day=d.getDay(),s=new Date(d);if(day===0)s.setDate(d.getDate()-2);else if(day===6)s.setDate(d.getDate()-1);else s.setDate(d.getDate()+(5-day));s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+2);e.setHours(23,59,59,999);return[s,e];}
function range(){const now=new Date();if(state.preset==="weekend")return weekendRange();if(state.preset==="today"){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return[s,e];}if(state.preset==="week"){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+7);return[s,e];}const s=new Date(now);s.setHours(0,0,0,0);return[s,new Date(8.64e15)];}

function passesFilters(ev){
  if(state.cats.size&&!state.cats.has(ev.category))return false;
  if(state.cost==="free"&&ev.is_free!==true)return false;
  if(state.cost==="10"&&!(ev.is_free===true||(ev.price_value!=null&&ev.price_value<=10)))return false;
  if(state.cost==="20"&&!(ev.is_free===true||(ev.price_value!=null&&ev.price_value<=20)))return false;
  if(state.q){const hay=(ev.title+" "+(ev.venue||"")+" "+(ev.area||"")).toLowerCase();if(!hay.includes(state.q))return false;}
  return true;
}
const priceKey=ev=>ev.is_free===true?0:(ev.price_value!=null?ev.price_value:Infinity);

function render(){
  const feed=document.getElementById("feed");
  const dir=state.mode==="directory";
  document.querySelectorAll(".filter-row").forEach(r=>r.style.display=dir?"none":"flex");
  if(!dir)document.getElementById("whenRow").style.display=state.mode==="recurring"?"none":"flex";
  feed.innerHTML = dir?renderDirectory() : (state.sort==="price"?renderFlat():renderGrouped());
  requestAnimationFrame(()=>document.documentElement.style.setProperty("--controls-h",document.getElementById("controls").offsetHeight+"px"));
}

function pool(){
  if(state.mode==="recurring")return ALL.filter(e=>e.recurring&&passesFilters(e));
  const[s,e]=range();
  return ALL.filter(e=>!e.recurring&&passesFilters(e)&&(()=>{const t=new Date(e.start);return t>=s&&t<=e;})());
}

function renderGrouped(){
  const rows=pool();
  setCount(rows.length,state.mode==="recurring"?"recurring":"one-off");
  if(!rows.length)return emptyState();
  if(state.mode==="recurring"){
    const wk={},other=[];
    for(const ev of rows){(ev.recurrence||"").startsWith("Weekly")?((wk[bDow(ev.start)]||=[]).push(ev)):other.push(ev);}
    let html="";
    for(const n of WEEKDAYS){if(!wk[n])continue;wk[n].sort((a,b)=>bTime(a.start).localeCompare(bTime(b.start)));html+=`<div class="day"><span class="dow">Every ${n}</span><span class="n">${wk[n].length}</span></div>`;for(const ev of wk[n])html+=card(ev,{recurring:true});}
    if(other.length){other.sort((a,b)=>new Date(a.start)-new Date(b.start));html+=`<div class="day"><span class="dow">Monthly &amp; occasional</span><span class="n">${other.length}</span></div>`;for(const ev of other)html+=card(ev,{recurring:true});}
    return html;
  }
  const byDay={};for(const ev of rows)(byDay[bDate(ev.start)]||=[]).push(ev);
  let html="";
  for(const day of Object.keys(byDay).sort()){const list=byDay[day];html+=`<div class="day"><span class="dow">${bDow(list[0].start)}</span><span class="date">${bDateL(list[0].start)}</span><span class="n">${list.length}</span></div>`;for(const ev of list)html+=card(ev,{recurring:false});}
  return html;
}

function renderFlat(){
  const recurring=state.mode==="recurring";
  const rows=pool().sort((a,b)=>priceKey(a)-priceKey(b)||new Date(a.start)-new Date(b.start));
  setCount(rows.length,recurring?"recurring":"one-off");
  if(!rows.length)return emptyState();
  let html=`<div class="day"><span class="dow">By price</span><span class="date">low → high</span><span class="n">${rows.length}</span></div>`;
  for(const ev of rows)html+=card(ev,{recurring,showDate:true});
  return html;
}

function card(ev,opts){
  const recurring=opts.recurring,showDate=opts.showDate;
  const catLabel=(CATS.find(c=>c[0]===ev.category)||["","Other"])[1].split(" ")[0];
  const to=(!recurring&&ev.end)?`<span class="to">→ ${bTime(ev.end)}</span>`:"";
  const title=ev.url?`<a href="${ev.url}" target="_blank" rel="noopener">${esc(ev.title)}</a>`:esc(ev.title);
  const lead=(showDate&&!recurring)?[bDow(ev.start).slice(0,3)+" "+bDateL(ev.start)]:[];
  const metaBits=[...lead,ev.venue,ev.area,ev.source.replace(/^cal:|^rss:|^web:/,"")].filter(Boolean).map(esc);
  const tr=ev.translated?`<span class="tag tr">↳ translated</span>`:"";
  const desc=ev.description?`<div class="desc">${esc(ev.description)}${tr}</div>`:(tr?`<div class="desc">${tr}</div>`:"");
  const money=ev.is_free===true?`<span class="tag free">Free</span>`:(ev.price?`<span class="tag price">${esc(ev.price)}</span>`:"");
  const cadence=recurring&&ev.recurrence?`<span class="tag cadence">${esc(ev.recurrence)}</span>`:"";
  return `<article class="ev"><div class="time">${bTime(ev.start)}${to}</div><div><div class="title">${title}</div><div class="meta">${metaBits.join(" · ")}</div>${desc}</div><div class="tags"><span class="tag">${catLabel}</span>${cadence}${money}</div></article>`;
}

function renderDirectory(){
  setCount(DIRECTORY.reduce((n,s)=>n+s.items.length,0),"curated");
  let html="";
  for(const sec of DIRECTORY){
    html+=`<div class="day"><span class="dow">${esc(sec.group)}</span><span class="n">${sec.items.length}</span></div><div class="dir">`;
    for(const it of sec.items)html+=`<a class="dir-item" href="${it.url}" target="_blank" rel="noopener"><span class="dir-name">${esc(it.name)}</span>${it.note?`<span class="dir-note">${esc(it.note)}</span>`:""}</a>`;
    html+=`</div>`;
  }
  return html;
}

function setCount(n,kind){document.getElementById("count").textContent=`${n} ${kind}${kind==="curated"?" sources":" event"+(n===1?"":"s")} shown`;}
function emptyState(){
  const b=state.cost!=="any"?" (or loosen the cost filter)":"";
  return `<div class="state"><b>Nothing here</b>No events match these filters${b}. Widen the date range, clear a category, or add feeds in <code>config.yaml</code>. Check the Sources panel at the bottom to see what's loading.</div>`;
}

function buildSeg(id,key,cb){document.getElementById(id).addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;state[key]=b.dataset[key];[...b.parentElement.children].forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));(cb||render)();});}
function buildCats(){const box=document.getElementById("cats");for(const[id,label]of CATS){const b=document.createElement("button");b.className="chip";b.textContent=label;b.setAttribute("aria-pressed","false");b.onclick=()=>{b.getAttribute("aria-pressed")==="true"?(state.cats.delete(id),b.setAttribute("aria-pressed","false")):(state.cats.add(id),b.setAttribute("aria-pressed","true"));render();};box.appendChild(b);}}
buildCats();
buildSeg("modes","mode");buildSeg("presets","preset");buildSeg("costs","cost");buildSeg("sorts","sort");
document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase();render();});

function showSources(sources){
  if(!sources)return;
  const grid=document.getElementById("srcGrid");
  grid.innerHTML=Object.entries(sources).map(([k,v])=>{
    const name=k.replace(/^cal:|^rss:/,"");
    return `<span class="src-item">${esc(name)} <span class="${v===0?"z":"c"}">${v}</span></span>`;
  }).join("");
  document.getElementById("sources").hidden=false;
}

fetch("events.json?_="+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(d=>{
    ALL=d.events||[];
    if(d.generated_at){const ago=Math.round((Date.now()-new Date(d.generated_at))/36e5);document.getElementById("updated").textContent="updated "+(ago<1?"just now":ago+"h ago");}
    render();showSources(d.sources);
  })
  .catch(err=>{
    document.getElementById("feed").innerHTML=`<div class="state"><b>Couldn't load events</b>events.json didn't load (${esc(err.message)}). Run <code>python aggregate.py</code>, or wait for the next scheduled update.</div>`;
    document.getElementById("count").textContent="—";
  });
</script>
</body>
</html>
