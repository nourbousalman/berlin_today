# ─────────────────────────────────────────────────────────────────────────────
# Berlin events aggregator — configuration
# Edit this file to add sources. No code changes needed for iCal/RSS feeds.
# ─────────────────────────────────────────────────────────────────────────────

# How far ahead to collect events (days).
horizon_days: 45

# Auto-translate German event titles/descriptions to English. Runs in the Action.
translate: true

# Free/cheap only: drop anything that costs more than this (in EUR), and drop
# events that are known to be paid but don't state a price (e.g. RA "ticketed").
# Free events, events priced at or under this, and events with no price signal
# are kept. Set higher if you want a bigger budget.
max_price: 5

# Resident Advisor — Berlin's club/electronic scene. DISABLED: it's paid clubs and
# its API doesn't expose ticket prices, so it can't fit a free/cheap (<=€5) planner
# (every event came through as "ticketed" with no amount). Flip to true if you ever
# want paid nightlife back.
resident_advisor:
  enabled: false
  area_id: 34          # 34 == Berlin. Verify at ra.co/events/de/berlin if results look off.

# iCal feeds — the robust, low-maintenance source. Add as many as you like.
# Each event is tagged with `category` unless the feed's own CATEGORIES say otherwise.
# category is one of: music, nightlife, art, sport, community, market, other
#
# Optional per-feed keys:
#   is_free: true|false   → force every event's free flag. Omit it and the app
#                           detects "free / kostenlos / gratis" from the text.
#   recurring: true       → send this whole feed to the "Weekly regulars" section
#                           (use for calendars of standing offers with no repeat rule).
# Events that carry a proper iCal repeat rule (RRULE) are detected as recurring
# automatically — no flag needed.
ics_feeds:
  # Hand-added real events (edit manual.ics to add your own one-offs or regulars).
  - name: "Sprachcafé Lighthouse"
    url: "manual.ics"
    category: "community"
    is_free: true

  # Bundled demo feed (a local file) so the pipeline produces output before you
  # add real feeds. Delete this entry once you've added your own.
  - name: "Demo"
    url: "sample.ics"
    category: "other"

  # ── Add real feeds below. Find them via a venue/org's "Subscribe / Add to
  #    calendar" link, or a public Google Calendar's "Public address in iCal format".
  # - name: "SO36"          # Kreuzberg venue
  #   url: "https://…/events.ics"
  #   category: "music"
  #   is_free: false
  # - name: "Sport im Park"
  #   url: "https://…/calendar.ics"
  #   category: "sport"
  #   is_free: true

# RSS / Atom feeds. Weaker for events (dates are often publish-dates), but handy
# for sources that only offer RSS.
rss_feeds:
  # ── Your sites, wired in as WordPress RSS. Coverage varies: some post real
  # dated events, others mostly news. The Sources panel on the page shows how
  # many each returned. Community centres are marked recurring so their standing
  # offers land in the "Recurring" section.
  # (Removed: NBH Urbanstraße, Mittelhof, Kleidertausch — those /feed/ URLs
  #  returned 0. If you find their real event feed, add it back here.)
  - name: "Rudi NBH"
    url: "https://rudi-nachbarschaftshaus.de/feed/"
    category: "community"
    recurring: true
  - name: "NBH Neukölln"
    url: "https://www.nbh-neukoelln.de/feed/"
    category: "community"
    recurring: true
  - name: "Literarische Aktion"
    url: "https://berliner-literarische-aktion.de/feed/"
    category: "art"
  # City-magazine blogs (WordPress). These post editorial round-ups more than
  # single dated events, so expect articles here — the Sources panel will show
  # how many land, and you can drop them if they're noisy.
  - name: "iHeartBerlin"
    url: "https://www.iheartberlin.de/feed/"
    category: "art"
  - name: "Mit Vergnügen"
    url: "https://mitvergnuegen.com/feed/"
    category: "other"

# HTML scrapers — fragile, opt-in. See sources/html_scrapers.py before enabling.
html_scrapers:
  enabled: false
